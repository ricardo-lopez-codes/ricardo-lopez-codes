name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ricardo-lopez-codes

          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2300BFFF&color_dots=%23003b00,%23ffcccc,%23ff9999,%23ff4d4d,%23cc0000

      - name: Push Snake
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
