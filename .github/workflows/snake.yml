name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ricardo-lopez-codes

          outputs: |
            dist/github-snake.svg?color_snake=#00BFFF&color_dots=#0f3d0f,#ffcccc,#ff9999,#ff4d4d,#cc0000
            dist/github-snake-dark.svg?color_snake=#00BFFF&color_dots=#0f3d0f,#ffcccc,#ff9999,#ff4d4d,#cc0000

      - name: Push snake animation
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
